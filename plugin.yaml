name: caido
version: 0.2.0
description: Caido HTTP proxy integration — search requests, replay, manage findings. Session management and advanced operations via bundled skills.
author: matt
provides_tools:
  - caido_search
  - caido_recent
  - caido_get
  - caido_replay_request
  - caido_send_raw
  - caido_findings
  - caido_create_finding
  - caido_health
  - caido_setup
provides_skills:
  - replay
  - utils
requires_env:
  - name: CAIDO_PAT
    description: "Caido Personal Access Token"
    secret: true
  - name: CAIDO_URL
    description: "Caido instance URL (e.g. http://127.0.0.1:8081)"
