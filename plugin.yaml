name: caido
version: 0.5.0
description: Caido HTTP proxy integration — onboard, search requests, manage findings. Replay, automate, and advanced operations via bundled skills.
author: matt
provides_tools:
  - caido_onboard
  - caido_search
  - caido_recent
  - caido_get
  - caido_findings
  - caido_create_finding
  - caido_health
provides_skills:
  - replay
  - utils
  - automate
requires_env:
  - name: CAIDO_PAT
    description: "Caido Personal Access Token"
    secret: true
  - name: CAIDO_URL
    description: "Caido instance URL (e.g. https://caido.example.com)"
